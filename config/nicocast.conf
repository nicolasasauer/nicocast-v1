# NicoCast default configuration
# Edit this file to customise your setup, then restart the service.
# Full documentation: see README.md

[general]
# Name shown on Android devices (Samsung Smart View, etc.)
device_name = NicoCast

# WPS PIN (used when connection_method = pin)
pin = 12345678

# Connection method: pbc (push-button, no PIN) or pin
connection_method = pbc

# Log level: DEBUG | INFO | WARNING | ERROR
log_level = INFO

[wifi]
# Wireless interface to use for Wi-Fi Direct
interface = wlan0

# Path to wpa_supplicant's control socket for the interface above
wpa_supplicant_socket = /var/run/wpa_supplicant/wlan0

# P2P Group-Owner intent (0–15; 15 = always be the GO, no existing AP required)
p2p_go_intent = 15

# WFD subelement hex string that advertises NicoCast as a Miracast primary sink.
#
# Structure (8 bytes, per Wi-Fi Display spec):
#   00       – WFD Subelement ID 0 (Device Information)
#   06       – data length 6 bytes
#   0011     – WFD Device Info:
#                bits [1:0] = 01  → Primary Sink
#                bit  [4]   =  1  → WFD session available
#   1C44     – RTSP control port 7236 (0x1C44)
#   0032     – Maximum throughput 50 Mbps (0x0032)
wfd_subelems = 000600111C440032

# Preferred 2.4 GHz Wi-Fi channel for the P2P group (1–11)
channel = 6

# Seconds to keep P2P_FIND running (0 = unlimited)
p2p_find_timeout = 120

[miracast]
# TCP port the Miracast RTSP server listens on (WFD standard: 7236)
rtsp_port = 7236

# UDP port that receives the incoming RTP video stream from the source device
rtp_port = 1028

# UDP port for RTCP (set to 0 to disable RTCP)
rtcp_port = 1029

# UDP port for RTP audio (set to 0 to disable audio reception)
audio_rtp_port = 1030

# Advertised video capabilities (WFD wfd_video_formats string).
#
# Fields: native profile level cea_res vesa_res hh_res latency
#         min_slice_size slice_enc_params frame_rate_ctrl max_hres max_vres
#
# CEA bitmap 0x0000FFFF → resolutions from 640×480@60 up to 1280×720@60.
# Reduce to 0x0000003F (up to 1280×720@30) if the Pi struggles with 720p60.
video_formats = 00 00 02 04 0000FFFF 00000000 00000000 00 0000 0000 00 none none

# Advertised audio capabilities
# LPCM 00000003 00 = 44.1 kHz + 48 kHz, 2 channels
# AAC  00000007 00 = 48 kHz AAC modes, 2 channels
audio_codecs = LPCM 00000003 00, AAC 00000007 00

# RTSP session idle-timeout in seconds
session_timeout = 60

# GStreamer RTP jitter-buffer latency in milliseconds
jitter_buffer_ms = 200

[display]
# GStreamer video sink:
#   auto      – let GStreamer pick the best available sink
#   kmssink   – KMS/DRM (recommended for Raspberry Pi OS Bookworm/Bullseye)
#   fbdevsink – legacy framebuffer (older kernels)
#   fakesink  – discard video (useful for testing without a display)
#
# On Raspberry Pi OS Lite (no desktop), use kmssink.
# The install script sets this automatically when it detects a headless image.
video_sink = kmssink

# Force full-screen output
fullscreen = true

# Audio output: hdmi | headphone | disabled
audio_output = hdmi

# Use hardware H.264 decoder (v4l2h264dec on RPi Zero 2W)
hw_decode = true

# Extra pipeline parameters appended verbatim to the GStreamer command line
extra_pipeline_opts =

[webui]
# Enable the settings web UI at http://<pi-ip>:8080/
enabled = true

# Port for the web UI
port = 8080

# Bind address (0.0.0.0 = all interfaces)
bind = 0.0.0.0
